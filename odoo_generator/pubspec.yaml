name: odoo_generator
description: Builder and code generator for odoo_core. Automatically generates Odoo models, rigid Repositories, and JSON mappings via Freezed-like syntax.
version: 2.0.3
# repository: https://github.com/my_org/my_repo

environment:
  sdk: ">=3.0.0 <4.0.0"

# Add regular dependencies here.
dependencies:
  analyzer: ^7.0.0
  build: ^3.0.0
  source_gen: ^3.0.0
  
  # IMPORTANT: To publish to pub.dev, change this path dependency to `odoo_core: ^2.0.0`
  odoo_core:
    path: ../odoo_core

dev_dependencies:
  build_runner: ^2.4.0
  lints: ^6.0.0
  test: ^1.24.0

publish_to: none
