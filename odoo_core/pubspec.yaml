name: odoo_core
description: Core package and SOLID architecture to connect Odoo via RPC and WebSockets in pure Dart or Flutter. Includes typed Repositories, models and serialization.
version: 2.1.1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  dio: ^5.7.0
  web_socket_channel: ^3.0.2

dev_dependencies:
  build_runner: ^2.4.0
  lints: ^6.0.0
  odoo_generator:
    path: ../odoo_generator
  test: ^1.25.6
  very_good_analysis: ^8.0.0
