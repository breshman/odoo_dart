version: 2.0.0

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  dio: ^5.7.0
  web_socket_channel: ^3.0.2

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6
